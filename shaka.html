<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ono Video Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/5.1.13/shaka-player.ui.min.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/5.1.13/controls.min.css" crossorigin="anonymous">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  .shaka-video-container {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .shaka-spinner-container,
.shaka-spinner,
.shaka-spinner-svg {
    display: none !important;
    visibility: hidden !important;
    opacity: 0 !important;
}


  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

/* Bottom-center overlay text */
  #overlay-text {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.7);
    font-size: 1.5vw;
    font-weight: 600;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    z-index: 10;
    pointer-events: none;
    font-family: sans-serif;
    letter-spacing: 0.1em;
  }

  @media (max-width: 600px) {
    #overlay-text {
      font-size: 16px;
      bottom: 8%;
    }
  }

  #click-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 20;
  cursor: pointer;
  transition: opacity 0.3s ease;
}

#click-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.play-btn {
  width: 90px;
  height: 90px;
  background: #ffffff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.play-text {
  margin-top: 16px;
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.8px;
  opacity: 0.9;
  font-family: sans-serif;
}

  
</style>
</head>

<body>

<!-- Shaka Player Video Container -->
<div class="shaka-video-container">
  <video playsinline preload="metadata" poster="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEipwFyueknjbWXtmnGkGVk_HOX3FhyrlrbzdRJmdvF7PCKYbOVYqYov1mCPchehq6dq1giBlDIPABNAxDmjkLfn5fLf4xhtdlHMsPmB2A27zQaR2-rHsu3BS0vYrkCkG2TrUtr-YkF-JTHh7JmDNuhIEbijStkJoVxOVBx2fjibrDlTfssDMiKPCouVUHI/s16000/ONOtv.png"></video>
</div>

<div id="overlay-text">ONO TV</div>
  
<div id="click-overlay">
    <div class="play-btn">
    <svg width="24" height="26" viewBox="0 0 24 28" fill="#000000" style="margin-left: 4px;">
      <path d="M23 12.3L3.1 0.4c-1-.6-2.2.2-2.2 1.4v23.7c0 1.2 1.3 2 2.2 1.4L23 15.1c.8-.5.8-1.8 0-2.8z"/>
    </svg>
  </div>  
  <div class="play-text">CLICK TO PLAY</div>
</div>

<!-- 
  ?ref = manifest file lookup for DASH or HLS
  ?hls = direct HLS, no manifest lookup
  -->
  <script>


// --- 1. GLOBAL Error handler ---
function onPlayerError(error) {
  const code = error && error.code ? error.code : 'UNKNOWN';
  console.error('Shaka error', error);
  alert('Stream failed (' + code + ')');
  // Update the state object for early exit
  window.streamError = code;
}

// init and everything else
document.addEventListener('DOMContentLoaded', async () => {
  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {
    alert('Browser not supported');
    return;
  }

  const video = document.querySelector('video');
  let player = new shaka.Player(video);

  const container = document.querySelector('.shaka-video-container');
  const ui = new shaka.ui.Overlay(player, container, video);

  player.addEventListener('error', (event) => onPlayerError(event.detail));
  ui.getControls().addEventListener('error', (event) => onPlayerError(event.detail));

  ui.configure({
    controlPanelElements: [
      'play_pause',
      'time_and_duration',
      'mute',
      'volume',
      'spacer',
      'quality',
      'fullscreen'
    ]
  });


const overlay = document.getElementById('click-overlay');

overlay.addEventListener('click', async () => {
  try {
    await video.play(); 
    overlay.classList.add('hidden');
  } catch (err) {
    console.error("User play failed:", err);
  }
});

video.addEventListener('play', () => overlay.classList.add('hidden'));
video.addEventListener('pause', () => {
  if (!video.controls) overlay.classList.remove('hidden');
});
  
// Stream Logic - Get ?ref= parameter
const params = new URLSearchParams(window.location.search);
const streamId = params.get('ref') || "1";
const directHlsUrl = params.get('hls');

// Direct MPD parameters
const directMpdUrl = params.get('mpd');
const clearKeyId = params.get('kid');
const clearKeyVal = params.get('key');

// DIRECT M3U8 HANDLING
if (directHlsUrl) {
  const url = decodeURIComponent(directHlsUrl);

  try { await ui.destroy(); } catch (e) { console.warn("UI destroy warning:", e); }
  try { await player.destroy(); } catch (e) { console.warn("Player destroy warning:", e); }
  player = null;

  video.controls = true;

  try {
    if (Hls.isSupported()) {
    
    const hls = new Hls({
    lowLatencyMode: false,
    enableWorker: true,
    maxBufferLength: 30,
    backBufferLength: 30
    });

      hls.loadSource(url);
      hls.attachMedia(video);
      console.log("✅ Direct HLS loaded via ref:", url);
    } else {
      video.src = url;
      console.log("✅ Direct HLS native:", url);
    }
  } catch (e) {
    console.error("Direct HLS load failed:", e);
    alert("Direct HLS stream failed");
  }
  return;
}
  
// DIRECT MPD HANDLING
  if (directMpdUrl) {
  try {
    const url = decodeURIComponent(directMpdUrl);
    
    // If ClearKeys are provided in the URL, configure Shaka Player
    if (clearKeyId && clearKeyVal) {
      player.configure({
        drm: { clearKeys: { [clearKeyId]: clearKeyVal } },
        streaming: { 
        lowLatencyMode: false,
        bufferingGoal: 20,    // Keeps a 20-second buffer ahead
        rebufferingGoal: 2,   // Only needs 2 seconds of data to resume after buffering
        bufferBehind: 20      // Keeps 20 seconds of video in memory for rewinding/stability
     }
      });
    }

    await player.load(url);
    await video.play().catch(() => {});
    console.log("✅ Direct MPD loaded via URL:", url);
    return; // Stop further logic so it doesn't fetch the manifest
    
  } catch (e) {
    onPlayerError(e);
    return;
  }
}

try {
  const response = await fetch("https://ytvs-db.pages.dev/manifest.json", {
    cache: "no-store"
  });

  if (!response.ok) throw new Error("Links fetch failed");

  const streams = await response.json();
  const stream = streams[streamId];

  if (!stream) {
    alert("Invalid stream ID");
    return;
  }

  if (stream.type === "dash") {
    if (stream.keyId && stream.key) {
      player.configure({
        drm: { clearKeys: { [stream.keyId]: stream.key } },
        streaming: { 
        lowLatencyMode: false,
        bufferingGoal: 20,    // Keeps a 20-second buffer ahead
        rebufferingGoal: 2,   // Only needs 2 seconds of data to resume after buffering
        bufferBehind: 20      // Keeps 20 seconds of video in memory for rewinding/stability
    }
      });
    }

    await player.load(stream.url);
    await video.play().catch(() => {});
    console.log("✅ DASH loaded:");
  }

else if (stream.type === "hls") {
  try { await ui.destroy(); } catch (e) { console.warn("UI destroy warning:", e); }
  try { await player.destroy(); } catch (e) { console.warn("Player destroy warning:", e); }
  player = null;

  video.controls = true;

  try {
    if (Hls.isSupported()) {
    
    const hls = new Hls({
    lowLatencyMode: false,
    enableWorker: true,
    maxBufferLength: 30,
    backBufferLength: 30
    });

      hls.loadSource(stream.url);
      hls.attachMedia(video);
      console.log("✅ HLS via hls.js:");
    } else {
      video.src = stream.url;
      console.log("✅ HLS native:");
    }
  } catch (e) {
    console.error("HLS load failed:", e);
    alert("HLS stream failed");
  }
}
  
} catch (err) {
  console.error("Stream load failed:", err);
  alert("Resource temporarily unavailable");
}

if ('wakeLock' in navigator) {
  try {
    navigator.wakeLock.request('screen').then(() => {
      console.log("🔒 Screen Wake Lock is active");
    });
  } catch (err) {
    console.warn(`Wake Lock failed: ${err.message}`);
  }
}
  
});
</script>


</body>
</html>
