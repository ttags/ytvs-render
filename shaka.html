<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ono Video Player</title>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.2.0/dist/shaka-player.ui.min.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.2.20/dist/controls.min.css" crossorigin="anonymous">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  .shaka-video-container {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .shaka-spinner-container,
.shaka-spinner,
.shaka-spinner-svg {
    display: none !important;
    visibility: hidden !important;
    opacity: 0 !important;
}


  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }


/* Bottom-center overlay text */
  #overlay-text {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.7);
    font-size: 1.5vw;
    font-weight: 600;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    z-index: 10;
    pointer-events: none;
    font-family: sans-serif;
    letter-spacing: 0.1em;
  }

  @media (max-width: 600px) {
    #overlay-text {
      font-size: 16px;
      bottom: 8%;
    }
  }

  #click-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 26;
  cursor: pointer;
  transition: opacity 0.3s ease;
}

#click-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.play-btn {
  width: 90px;
  height: 90px;
  background: #ffffff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.play-text {
  margin-top: 16px;
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.8px;
  opacity: 0.9;
  font-family: sans-serif;
}

/* Error Status Overlay */
  #status-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    color: #fff;
    font-family: sans-serif;
    padding: 20px;
    text-align: center;
  }
  #status-overlay.active {
    display: flex;
  }
  #status-overlay h2 {
    font-size: 20px;
    margin-bottom: 10px;
    color: #ff3b30;
  }
  #status-overlay p {
    font-size: 14px;
    color: #ccc;
  }

  /* Live Tracking Badge Indicator */
  #live-indicator {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 9999;
    display: none;
    align-items: center;
    gap: 6px;
    background: rgba(0, 0, 0, 0.6);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: sans-serif;
    font-size: 12px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 0.5px;
  }
  #live-indicator.visible {
    display: flex;
  }
  #live-indicator .dot {
    width: 8px;
    height: 8px;
    background: #ff3b30;
    border-radius: 50%;
  }
  #live-indicator.behind .dot {
    background: #8e8e93;
  }
  #live-indicator.behind {
    opacity: 0.8;
  }
  
  .error-actions {
    margin-top: 20px;
  }
  
  .error-btn {
    padding: 10px 20px;
    background: #0071e3;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
    font-family: sans-serif;
  }
  
</style>
</head>
