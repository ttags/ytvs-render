<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ono Video Player</title>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.13/dist/shaka-player.ui.min.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.13/dist/controls.min.css" crossorigin="anonymous">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  .shaka-video-container {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .shaka-spinner-container,
.shaka-spinner,
.shaka-spinner-svg {
    display: none !important;
    visibility: hidden !important;
    opacity: 0 !important;
}


  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }


/* Bottom-center overlay text */
  #overlay-text {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.7);
    font-size: 1.5vw;
    font-weight: 600;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    z-index: 10;
    pointer-events: none;
    font-family: sans-serif;
    letter-spacing: 0.1em;
  }

  @media (max-width: 600px) {
    #overlay-text {
      font-size: 16px;
      bottom: 8%;
    }
  }

  #click-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 20;
  cursor: pointer;
  transition: opacity 0.3s ease;
}

#click-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.play-btn {
  width: 90px;
  height: 90px;
  background: #ffffff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.play-text {
  margin-top: 16px;
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.8px;
  opacity: 0.9;
  font-family: sans-serif;
}

/* Error Status Overlay */
  #status-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    color: #fff;
    font-family: sans-serif;
    padding: 20px;
    text-align: center;
  }
  #status-overlay.active {
    display: flex;
  }
  #status-overlay h2 {
    font-size: 20px;
    margin-bottom: 10px;
    color: #ff3b30;
  }
  #status-overlay p {
    font-size: 14px;
    color: #ccc;
  }

  /* Live Tracking Badge Indicator */
  #live-indicator {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 9999;
    display: none;
    align-items: center;
    gap: 6px;
    background: rgba(0, 0, 0, 0.6);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: sans-serif;
    font-size: 12px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 0.5px;
  }
  #live-indicator.visible {
    display: flex;
  }
  #live-indicator .dot {
    width: 8px;
    height: 8px;
    background: #ff3b30;
    border-radius: 50%;
  }
  #live-indicator.behind .dot {
    background: #8e8e93;
  }
  #live-indicator.behind {
    opacity: 0.8;
  }
  
</style>
</head>

<body>

<!-- Shaka Player Video Container -->
<div class="shaka-video-container">
  <video playsinline preload="metadata" poster="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEipwFyueknjbWXtmnGkGVk_HOX3FhyrlrbzdRJmdvF7PCKYbOVYqYov1mCPchehq6dq1giBlDIPABNAxDmjkLfn5fLf4xhtdlHMsPmB2A27zQaR2-rHsu3BS0vYrkCkG2TrUtr-YkF-JTHh7JmDNuhIEbijStkJoVxOVBx2fjibrDlTfssDMiKPCouVUHI/s16000/ONOtv.png"></video>

<div id="overlay-text">ONO TV</div>


<div id="subtle-loader" style="position:absolute; inset:0; background:rgba(0,0,0,0.5); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:99999; color:#fff; font-family:sans-serif; gap:12px;">
  <div style="width:40px; height:40px; border:4px solid rgba(255,255,255,0.2); border-top-color:#ff3b30; border-radius:50%; animation:spin 0.8s linear infinite;"></div>
  <div id="subtle-loader-text" style="font-size:14px; opacity:0.9;">Loading...</div>
</div>
<style> @keyframes spin { to { transform: rotate(360deg); } }</style>
  
<div id="status-overlay">
  <h2 id="status-title">Playback Error</h2>
  <p id="status-msg">The stream has encountered an issue.</p>
</div>

<div id="live-indicator" title="Click to sync back to live edge">
  <div class="dot"></div>
  <span>LIVE</span>
</div>

<div id="click-overlay">
    <div class="play-btn">
    <svg width="24" height="26" viewBox="0 0 24 28" fill="#000000" style="margin-left: 4px;">
      <path d="M23 12.3L3.1 0.4c-1-.6-2.2.2-2.2 1.4v23.7c0 1.2 1.3 2 2.2 1.4L23 15.1c.8-.5.8-1.8 0-2.8z"/>
    </svg>
  </div>  
  <div class="play-text">CLICK TO PLAY</div>
</div>


</div>
  
  <script>


// --- 1. GLOBAL Error handler ---
function onPlayerError(error) {
  let code = 'UNKNOWN_ERROR';
  let msg = 'An unexpected error occurred.';

  if (typeof error === 'string') {
    code = error;
    msg = 'Internal player state exception';
  } else if (typeof error === 'number') {
    code = `NATIVE_VIDEO_ERR_${error}`;
    msg = 'HTML5 Video Element media error status';
  } else if (error && typeof error === 'object') {
    code = error.code || 'OBJECT_ERROR';
    msg = error.message || 'No contextual message provided';
  }

  console.error('Terminal Player Error Registered:', error);
  window.streamError = code;
  
  const statusOverlay = document.getElementById('status-overlay');
  const statusMsg = document.getElementById('status-msg');
  if (statusOverlay && statusMsg) {
    statusMsg.textContent = `Stream error: ${code} (${msg})`;
    statusOverlay.classList.add('active');
  }
}

// init and everything else
document.addEventListener('DOMContentLoaded', async () => {
  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {
    onPlayerError('Browser_Unsupported');
    return;
  }

  const video = document.querySelector('video');
  let player = new shaka.Player(video);

  const container = document.querySelector('.shaka-video-container');
  const ui = new shaka.ui.Overlay(player, container, video);

  let recoverableTimeout = null;

function showReconnecting() {
  const loader = document.getElementById('subtle-loader');
  const loaderText = document.getElementById('subtle-loader-text');
  if (loader) {
    loaderText.textContent = 'Reconnecting...';
    loader.style.display = 'flex';
  }
  // Auto-hide safety net in case no success/failure event ever arrives
  clearTimeout(recoverableTimeout);
  recoverableTimeout = setTimeout(hideReconnecting, 8000);
}

function hideReconnecting() {
  const loader = document.getElementById('subtle-loader');
  if (loader) loader.style.display = 'none';
  clearTimeout(recoverableTimeout);
}
  
player.addEventListener('error', (event) => {
    // If Shaka can recover, just log it and let it do its thing behind the scenes
    if (event.detail && event.detail.severity === shaka.util.Error.Severity.RECOVERABLE) {
      console.warn('Recoverable Shaka error (retrying...):', event.detail);
      showReconnecting();
      return; 
    }
    // Only trigger the overlay for CRITICAL, non-recoverable errors
    hideReconnecting();
    onPlayerError(event.detail);
  });

  ui.getControls().addEventListener('error', (event) => {
    if (event.detail && event.detail.severity === shaka.util.Error.Severity.RECOVERABLE) return;
    onPlayerError(event.detail);
  });
  video.addEventListener('error', (e) => onPlayerError(video.error ? video.error.code : 'Native_Video_Error'));

  ui.configure({
    controlPanelElements: [
      'play_pause',
      'time_and_duration',
      'mute',
      'volume',
      'spacer',
      'quality',
      'fullscreen'
    ]
  });

const overlay = document.getElementById('click-overlay');

overlay.addEventListener('click', async () => {
  try {
    await video.play(); 
    overlay.classList.add('hidden');
  } catch (err) {
    console.error("User play failed:", err);
  }
});

video.addEventListener('play', () => overlay.classList.add('hidden'));
video.addEventListener('playing', hideReconnecting);
player.addEventListener('buffering', (event) => {
    if (event.buffering) showReconnecting();
    else hideReconnecting();
  });
  
// Stream Logic - Get ?ref= parameter
const params = new URLSearchParams(window.location.search);
const streamId = params.get('ref') || "1";
const directHlsUrl = params.get('hls');

// Direct MPD parameters
const directMpdUrl = params.get('mpd');
const clearKeyId = params.get('kid');
const clearKeyVal = params.get('key');

// DIRECT M3U8 HANDLING
if (directHlsUrl) {
  const url = decodeURIComponent(directHlsUrl);

  try { await ui.destroy(); } catch (e) { console.warn("UI destroy warning:", e); }
  try { await player.destroy(); } catch (e) { console.warn("Player destroy warning:", e); }
  player = null;

  video.controls = true;

  try {
    if (Hls.isSupported()) {
    
    const hls = new Hls({
    lowLatencyMode: false,
    enableWorker: true,
    maxBufferLength: 30,
    backBufferLength: 30
    });

    let hlsRetryCount = 0; // Added counter

    hls.on(Hls.Events.ERROR, function (event, data) {
    if (data.fatal) {

    switch(data.type) {

    case Hls.ErrorTypes.NETWORK_ERROR:
      if (data.response && (data.response.code === 403 || data.response.code === 404)) {
        onPlayerError({ code: `HLS_HTTP_${data.response.code}`, message: 'Fatal HTTP error' });
        hls.destroy();
        break;
      }
      if (hlsRetryCount < 3) {
        hlsRetryCount++;
        console.warn(`HLS network error, retrying... (${hlsRetryCount}/3)`);
        showReconnecting();  
        hls.startLoad();
      } else {
        onPlayerError({ code: 'HLS_NETWORK_EXHAUSTED', message: 'Max retries reached' });
        hls.destroy();
      }
      break;

    case Hls.ErrorTypes.MEDIA_ERROR:
      console.warn("HLS media error, recovering...");
      hls.recoverMediaError();
      break;

    default:
      onPlayerError('HLS_FATAL_' + data.type);
      break;
  }

}
    });

      hls.loadSource(url);
      hls.attachMedia(video);
      console.log("✅ Direct HLS loaded via ref:", url);
    } else {
      video.src = url;
      console.log("✅ Direct HLS native:", url);
    }
  } catch (e) {
    console.error("Direct HLS load failed:", e);
    onPlayerError("Direct_HLS_stream_failed");
  }
  return;
}
  
// DIRECT MPD HANDLING
if (directMpdUrl) {
  try {
    const url = decodeURIComponent(directMpdUrl);
    
    // Configurable retry params for aggressive network fallback
    const resilientRetryConfig = { 
      maxAttempts: 10,
      baseDelay: 500, 
      backoffFactor: 1.5, 
      timeout: 30000, 
      fuzzFactor: 0.5 
    };

    // Global configuration structure
    const config = {
      abr: {
        enabled: true,
        restrictToElementSize: true
      },
      manifest: {
        retryParameters: resilientRetryConfig,
        defaultPresentationDelay: 12, 
          dash: { 
            ignoreSuggestedPresentationDelay: true, // Forces Shaka to ignore the server's setting
            autoCorrectDrift: true 
              }
      },
      streaming: { 
        lowLatencyMode: false,
        bufferingGoal: 30,    
        rebufferingGoal: 4,   
        bufferBehind: 20,
        jumpLargeGaps: true,
        gapDetectionThreshold: 0.5,
        stallEnabled: true,
        stallThreshold: 1,
        retryParameters: resilientRetryConfig
      }
    };

    // Add DRM configuration if keys exist in URL query params
    if (clearKeyId && clearKeyVal) {
      config.drm = { 
        clearKeys: { [clearKeyId]: clearKeyVal },
        retryParameters: resilientRetryConfig
      };
    }

    player.configure(config);
    await player.load(url);
    await video.play().catch(() => {});
    console.log("✅ Direct MPD loaded via URL:", url);
    return;
    
  } catch (e) {
    onPlayerError(e);
    return;
  }
}

try {
  const response = await fetch("https://ytvs-db.pages.dev/manifest.json", {
    cache: "no-store"
  });

  if (!response.ok) throw new Error("Links fetch failed");

  const streams = await response.json();
  const stream = streams[streamId];

  if (!stream) {
    onPlayerError("Invalid_stream_ID");
    return;
  }

  if (stream.type === "dash") {
    const resilientRetryConfig = { 
      maxAttempts: 10,
      baseDelay: 500, 
      backoffFactor: 1.5, 
      timeout: 30000, 
      fuzzFactor: 0.5 
    };
    
    const config = {
      abr: {
        enabled: true,
        restrictToElementSize: true
      },
      manifest: {
        retryParameters: resilientRetryConfig,
        defaultPresentationDelay: 12, 
          dash: { 
            ignoreSuggestedPresentationDelay: true, // Forces Shaka to ignore the server's setting
            autoCorrectDrift: true 
              }
      },
      streaming: { 
        lowLatencyMode: false,
        bufferingGoal: 30,    
        rebufferingGoal: 4,   
        bufferBehind: 20,
        jumpLargeGaps: true,
        gapDetectionThreshold: 0.5,
        stallEnabled: true,
        stallThreshold: 1,
        retryParameters: resilientRetryConfig
      }
    };

    // Correctly reference 'stream.keyId' and 'stream.key' here instead of URL params
    if (stream.keyId && stream.key) {
      config.drm = { 
        clearKeys: { [stream.keyId]: stream.key },
        retryParameters: resilientRetryConfig
      };
    }

    player.configure(config);
    await player.load(stream.url);
    await video.play().catch(() => {});
    console.log("✅ DASH loaded:");
  }
    
else if (stream.type === "hls") {
  try { await ui.destroy(); } catch (e) { console.warn("UI destroy warning:", e); }
  try { await player.destroy(); } catch (e) { console.warn("Player destroy warning:", e); }
  player = null;

  video.controls = true;

  try {
    if (Hls.isSupported()) {
    
    const hls = new Hls({
    lowLatencyMode: false,
    enableWorker: true,
    maxBufferLength: 30,
    backBufferLength: 30
    });

    let hlsRetryCount = 0; // Added counter

    hls.on(Hls.Events.ERROR, function (event, data) {
    if (data.fatal) {

  switch(data.type) {

    case Hls.ErrorTypes.NETWORK_ERROR:
      if (data.response && (data.response.code === 403 || data.response.code === 404)) {
        onPlayerError({ code: `HLS_HTTP_${data.response.code}`, message: 'Fatal HTTP error' });
        hls.destroy();
        break;
      }
      if (hlsRetryCount < 3) {
        hlsRetryCount++;
        console.warn(`HLS network error, retrying... (${hlsRetryCount}/3)`);
        showReconnecting();  
        hls.startLoad();
      } else {
        onPlayerError({ code: 'HLS_NETWORK_EXHAUSTED', message: 'Max retries reached' });
        hls.destroy();
      }
      break;

    case Hls.ErrorTypes.MEDIA_ERROR:
      console.warn("HLS media error, recovering...");
      hls.recoverMediaError();
      break;

    default:
      onPlayerError('HLS_FATAL_' + data.type);
      break;
  }

}
    });

      hls.loadSource(stream.url);
      hls.attachMedia(video);
      console.log("✅ HLS via hls.js:");
    } else {
      video.src = stream.url;
      console.log("✅ HLS native:");
    }
  } catch (e) {
    console.error("HLS load failed:", e);
    onPlayerError("HLS_stream_failed");
  }
}
  
} catch (err) {
  console.error("Stream load failed:", err);
  onPlayerError("Resource_temporarily_unavailable");
}

if ('wakeLock' in navigator) {
  try {
    navigator.wakeLock.request('screen').then(() => {
      console.log("🔒 Screen Wake Lock is active");
    });
  } catch (err) {
    console.warn(`Wake Lock failed: ${err.message}`);
  }
}

// Live Edge Sync Action Listener
  const liveIndicator = document.getElementById('live-indicator');
  if (liveIndicator) {
    liveIndicator.addEventListener('click', () => {
      try {
        if (player && player.isLive()) {
          video.currentTime = player.seekRange().end - 1;
        } else if (!player && video.seekable && video.seekable.length > 0) {
          video.currentTime = video.seekable.end(video.seekable.length - 1) - 1;
        }
        video.play().catch(() => {});

      } catch (e) { console.warn("Live sync catch trigger:", e); }
    });
  }

  // Active Playback Watchdog Heartbeat Monitoring Routine
  let lastTrackedTime = -1;
  let stagnantFrameCounter = 0;

    setInterval(() => {
    if (!video) return;

    // Check Live Stream Synchronization Delays
    try {
    const isHlsLive = !player && video.duration === Infinity;
      if ((player && player.isLive()) || isHlsLive) {
        liveIndicator.classList.add('visible');
        const edge = player ? player.seekRange().end : (video.seekable.length ? video.seekable.end(video.seekable.length - 1) : video.currentTime);
        const driftDistance = edge - video.currentTime;
        liveIndicator.classList.toggle('behind', driftDistance > 15);
      } else {
        liveIndicator.classList.remove('visible');
      }
    } catch (err) { /* Silent ignore if seekRange isn't ready */ }

    // Check For Stalled Playback Frames
    if (video.paused || video.ended || video.readyState < 3) {
      if (video) lastTrackedTime = video.currentTime;
      return;
    }

    if (Math.abs(video.currentTime - lastTrackedTime) < 0.01) {
      stagnantFrameCounter++;
      if (stagnantFrameCounter >= 4) { // Frozen across 4 straight iterations
        console.warn("Watchdog Action: Stagnant playback detected. Pushing head position.");
        try {
         const isHlsLive = !player && video.duration === Infinity;
          if ((player && player.isLive()) || isHlsLive) {
            video.currentTime = player ? (player.seekRange().end - 1) : (video.seekable.length ? video.seekable.end(video.seekable.length - 1) - 1 : video.currentTime);
          } else {
            video.currentTime += 0.05; // Small bump forward for VOD assets
          }
        } catch (e) { console.error("Watchdog recovery skip sequence failed:", e); }
        stagnantFrameCounter = 0;
      }
    } else {
      stagnantFrameCounter = 0;
    }
    lastTrackedTime = video.currentTime;
  }, 1000);
  
});
</script>


</body>
</html>
